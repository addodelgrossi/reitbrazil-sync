version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - gosec
    - gocritic
    - revive

  settings:
    revive:
      rules:
        - name: exported
          disabled: true
        - name: package-comments
          disabled: true
    gosec:
      excludes:
        - G304 # file path comes from config, reviewed
        - G115 # int conversions reviewed (BQ row counts, etc.)

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
